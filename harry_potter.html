<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魔法大课堂 · 哈利·波特百科</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@700&family=Noto+Serif+SC:wght@300;400;500;600&family=EB+Garamond:ital@0;1&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0c16;
    --ink-2:#0f1222;
    --panel:#161a2e;
    --panel-2:#1c2138;
    --gold:#d4b261;
    --gold-bright:#f2d98a;
    --gold-dim:#8a7438;
    --parchment:#ece3cf;
    --parchment-dim:#b7af9c;
    --c-char:#e0b34a;   /* 人物 */
    --c-place:#5fb487;  /* 地点 */
    --c-spell:#8e8df0;  /* 魔咒 */
    --c-potion:#cc6f8e; /* 魔药 */
    --line:rgba(212,178,97,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(1200px 800px at 80% -10%, rgba(142,141,240,.10), transparent 60%),
      radial-gradient(900px 700px at -10% 100%, rgba(95,180,135,.08), transparent 55%),
      linear-gradient(180deg,var(--ink) 0%, var(--ink-2) 100%);
    background-attachment:fixed;
    color:var(--parchment);
    font-family:'Noto Serif SC','EB Garamond',serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  /* 星点背景 */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.35), transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(242,217,138,.5), transparent),
      radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 12% 75%, rgba(255,255,255,.3), transparent),
      radial-gradient(1.5px 1.5px at 55% 15%, rgba(255,255,255,.4), transparent);
    background-size:600px 600px,500px 500px,700px 700px,400px 400px,650px 650px,550px 550px;
    opacity:.6;
  }
  .wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 22px 90px}
  .app{display:flex;align-items:flex-start;max-width:1300px;margin:0 auto;min-height:100vh}
  .sidebar{width:252px;flex:0 0 252px;border-right:1px solid var(--line);padding:22px 14px 34px;position:sticky;top:0;height:100vh;overflow-y:auto;background:linear-gradient(180deg,rgba(20,22,40,.55),transparent)}
  .sidebar .crest{margin-bottom:12px}
  .side-title{font-family:'Cinzel',serif;font-size:1.14rem;color:var(--gold-bright);letter-spacing:.03em;line-height:1.3;margin-bottom:20px}
  .side-title span{display:block;font-size:.55rem;letter-spacing:.18em;color:var(--parchment-dim);margin-top:5px}
  .side-nav{display:flex;flex-direction:column;gap:5px}
  .side-sec{font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--parchment-dim);margin:18px 0 6px;padding-left:6px}
  .side-item{text-align:left;cursor:pointer;background:none;border:1px solid transparent;border-radius:10px;padding:10px 12px;color:var(--parchment-dim);font-size:.92rem;transition:.2s;font-family:inherit}
  .side-item .zh{font-family:'Noto Serif SC',serif;color:var(--parchment);margin-right:6px}
  .side-item small{display:block;font-size:.7rem;color:var(--parchment-dim);margin-top:3px}
  .side-item:hover{border-color:var(--gold-dim);color:var(--parchment)}
  .side-item.active{background:var(--gold);border-color:var(--gold);color:var(--ink)}
  .side-item.active .zh,.side-item.active small{color:var(--ink)}
  .side-search{margin-top:18px;display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:9px 11px;color:var(--parchment-dim)}
  .side-search svg{width:16px;height:16px;flex-shrink:0}
  .side-search input{flex:1;min-width:0;background:none;border:none;color:var(--parchment);font-size:.88rem;outline:none;font-family:inherit}
  .main{flex:1;min-width:0;padding:26px 26px 80px}
  .lang-btn{position:fixed;top:14px;right:16px;z-index:200;cursor:pointer;font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.08em;padding:8px 14px;border-radius:20px;border:1px solid var(--gold);background:rgba(20,16,8,.72);color:var(--gold-bright);backdrop-filter:blur(4px);transition:.2s}
  .lang-btn:hover{background:var(--gold);color:var(--ink)}
  .side-item b{font-weight:600}
  #gamesView .game-panel{max-width:100%;max-height:none;box-shadow:none;animation:none;margin:0 auto}
  .home-hero{text-align:center;margin:10px 0 28px}
  .hero-motto{font-family:'Cinzel Decorative',serif;letter-spacing:.22em;font-size:.7rem;color:var(--gold-dim);text-transform:uppercase;margin-bottom:16px}
  .hero-title{font-family:'Ma Shan Zheng','Cinzel Decorative',cursive,serif;font-size:3.4rem;color:var(--gold-bright);line-height:1.1;letter-spacing:.06em;text-shadow:0 0 22px rgba(212,178,97,.4),0 0 4px rgba(212,178,97,.5)}
  .hero-sub{font-family:'Cinzel Decorative',serif;letter-spacing:.38em;font-size:.78rem;color:var(--parchment-dim);text-transform:uppercase;margin-top:12px}
  @media(max-width:560px){.hero-title{font-size:2.4rem}}
  @media(max-width:760px){.app{flex-direction:column}.sidebar{width:auto;flex:none;height:auto;position:static;border-right:none;border-bottom:1px solid var(--line);background:none}.side-nav{flex-direction:row;flex-wrap:wrap}.side-item{flex:1 1 auto}.side-item small{display:none}.side-sec{width:100%}.main{padding:18px 14px 60px}}

  /* ===== 页眉 ===== */
  header{text-align:center;padding:64px 0 30px;position:relative}
  .crest{
    font-family:'Cinzel Decorative',serif;letter-spacing:.32em;
    color:var(--gold-dim);font-size:.72rem;text-transform:uppercase;margin-bottom:18px;
  }
  h1{
    font-family:'Cinzel',serif;font-weight:700;line-height:1.05;
    font-size:clamp(2.3rem,6vw,4.4rem);
    background:linear-gradient(180deg,var(--gold-bright),var(--gold) 55%,var(--gold-dim));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 30px rgba(212,178,97,.18);
  }
  h1 small{display:block;font-family:'Noto Serif SC',serif;font-weight:300;
    font-size:clamp(.85rem,2vw,1.1rem);letter-spacing:.5em;color:var(--parchment-dim);
    -webkit-text-fill-color:var(--parchment-dim);margin-top:14px;}
  .divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:26px auto 0;max-width:340px}
  .divider span{height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
  .divider b{color:var(--gold);font-size:1.1rem}
  .tagline{margin-top:18px;color:var(--parchment-dim);font-style:italic;font-family:'EB Garamond',serif;font-size:1.05rem}

  /* ===== 控制区 ===== */
  .controls{position:sticky;top:0;z-index:20;padding:16px 0 14px;margin-bottom:8px;
    background:linear-gradient(180deg,var(--ink) 60%,rgba(10,12,22,0));}
  .search{position:relative;max-width:520px;margin:0 auto 18px}
  .search input{
    width:100%;padding:14px 18px 14px 46px;border-radius:40px;
    background:rgba(22,26,46,.85);border:1px solid var(--line);
    color:var(--parchment);font-family:'Noto Serif SC',serif;font-size:1rem;
    outline:none;transition:.25s;backdrop-filter:blur(6px);
  }
  .search input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,178,97,.12)}
  .search input::placeholder{color:var(--parchment-dim)}
  .search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;stroke:var(--gold);opacity:.7}
  .filters{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .filters button{
    cursor:pointer;font-family:'Cinzel',serif;font-size:.86rem;letter-spacing:.06em;
    padding:9px 20px;border-radius:30px;border:1px solid var(--line);
    background:rgba(22,26,46,.6);color:var(--parchment-dim);transition:.25s;
  }
  .filters button .zh{font-family:'Noto Serif SC',serif;margin-right:6px}
  .filters button:hover{color:var(--parchment);border-color:var(--gold-dim)}
  .filters button.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:600}
  .count{text-align:center;color:var(--parchment-dim);font-size:.82rem;letter-spacing:.1em;margin:18px 0 6px}

  /* ===== 卡片网格 ===== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
  .card{
    position:relative;background:linear-gradient(160deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:14px;padding:22px 22px 20px;
    cursor:pointer;overflow:hidden;transition:transform .3s cubic-bezier(.2,.7,.3,1),box-shadow .3s,border-color .3s;
    animation:rise .5s both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .card::before{content:"";position:absolute;inset:0;border-radius:14px;padding:1px;
    background:linear-gradient(140deg,transparent,var(--accent),transparent);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:.3s;}
  .card:hover{transform:translateY(-6px);box-shadow:0 18px 40px -18px rgba(0,0,0,.8)}
  .card:hover::before{opacity:.9}
  .card .tag{display:inline-flex;align-items:center;gap:6px;font-family:'Cinzel',serif;
    font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:3px 11px;opacity:.9}
  .card .tag::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .card h3{font-family:'Noto Serif SC',serif;font-weight:600;font-size:1.32rem;margin:14px 0 3px;color:var(--parchment)}
  .card .en{font-family:'EB Garamond',serif;font-style:italic;color:var(--accent);font-size:.98rem;letter-spacing:.02em}
  .card .meta{margin-top:10px;font-size:.8rem;color:var(--parchment-dim);letter-spacing:.03em}
  .card .snippet{margin-top:12px;font-size:.92rem;line-height:1.65;color:var(--parchment-dim);
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card .more{margin-top:14px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;color:var(--accent);opacity:.8}

  /* 插画区域 */
  .card-art{margin:-22px -22px 16px;height:152px;overflow:hidden;border-bottom:1px solid var(--line);position:relative}
  .card-art svg{width:100%;height:100%;display:block}
  .card-art::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 58%,rgba(22,26,46,.6));pointer-events:none}
  .modal-art{margin:-40px -38px 20px;height:212px;overflow:hidden;border-radius:18px 18px 0 0;border-bottom:1px solid var(--accent,var(--gold))}
  .modal-art svg{width:100%;height:100%;display:block}

  /* 类别颜色 */
  .card[data-cat="character"]{--accent:var(--c-char)}
  .card[data-cat="place"]{--accent:var(--c-place)}
  .card[data-cat="spell"]{--accent:var(--c-spell)}
  .card[data-cat="potion"]{--accent:var(--c-potion)}

  .empty{text-align:center;color:var(--parchment-dim);padding:60px 0;font-style:italic;font-family:'EB Garamond',serif;font-size:1.2rem}

  /* ===== 详情弹窗 ===== */
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(5,6,12,.78);backdrop-filter:blur(8px);
    display:none;align-items:center;justify-content:center;padding:24px;animation:fade .3s}
  .overlay.open{display:flex}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{position:relative;max-width:620px;width:100%;max-height:86vh;overflow-y:auto;
    background:linear-gradient(165deg,var(--panel),var(--ink-2));
    border:1px solid var(--accent,var(--gold));border-radius:18px;padding:40px 38px 36px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.9);animation:pop .35s cubic-bezier(.2,.8,.3,1)}
  @keyframes pop{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:none}}
  .modal::-webkit-scrollbar{width:8px}
  .modal::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:8px}
  .modal .tag{display:inline-flex;align-items:center;gap:6px;font-family:'Cinzel',serif;font-size:.68rem;
    letter-spacing:.14em;text-transform:uppercase;color:var(--accent,var(--gold));
    border:1px solid var(--accent,var(--gold));border-radius:20px;padding:4px 13px}
  .modal h2{font-family:'Noto Serif SC',serif;font-weight:600;font-size:2rem;margin:16px 0 4px;color:var(--parchment)}
  .modal .en{font-family:'EB Garamond',serif;font-style:italic;color:var(--accent,var(--gold));font-size:1.15rem}
  .modal .modal-divider{height:1px;margin:22px 0;background:linear-gradient(90deg,var(--accent,var(--gold)),transparent)}
  .modal .field{margin-bottom:16px}
  .modal .field .label{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent,var(--gold));opacity:.85;margin-bottom:5px}
  .modal .field .value{font-size:1rem;line-height:1.55;color:var(--parchment)}
  .modal .desc{font-size:1.04rem;line-height:1.85;color:var(--parchment);font-family:'Noto Serif SC',serif;font-weight:300}
  .modal .desc p{margin-bottom:12px}
  .close{position:absolute;top:16px;right:18px;width:36px;height:36px;border-radius:50%;
    border:1px solid var(--line);background:rgba(0,0,0,.3);color:var(--parchment);cursor:pointer;
    font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:.25s}
  .close:hover{background:var(--accent,var(--gold));color:var(--ink);border-color:transparent}

  /* ===== 决斗俱乐部 / 小游戏 ===== */
  .duel-launch{margin-top:28px;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.06em;display:inline-flex;align-items:center;gap:10px;
    padding:13px 30px;border-radius:34px;border:1px solid var(--gold);
    background:linear-gradient(180deg,rgba(212,178,97,.18),rgba(212,178,97,.04));color:var(--gold-bright);font-size:.95rem;transition:.25s}
  .duel-launch svg{width:18px;height:18px}
  .duel-launch:hover{background:var(--gold);color:var(--ink);box-shadow:0 10px 34px -10px rgba(212,178,97,.55);transform:translateY(-2px)}
  .game-panel{position:relative;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;
    background:linear-gradient(165deg,var(--panel),var(--ink-2));border:1px solid var(--gold);
    border-radius:18px;padding:32px 30px;box-shadow:0 30px 90px -20px rgba(0,0,0,.92);animation:pop .35s cubic-bezier(.2,.8,.3,1)}
  .game-panel::-webkit-scrollbar{width:8px}.game-panel::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:8px}
  .game-close{position:absolute;top:14px;right:16px;width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:rgba(0,0,0,.3);color:var(--parchment);cursor:pointer;font-size:1.15rem;display:flex;align-items:center;justify-content:center;transition:.25s;z-index:3}
  .game-close:hover{background:var(--gold);color:var(--ink)}
  .game-head{text-align:center;margin-bottom:20px;position:relative}
  .game-head h2{font-family:'Cinzel',serif;color:var(--gold-bright);font-size:1.5rem}
  .gh-sub{color:var(--parchment-dim);margin-top:6px;font-style:italic;font-family:'EB Garamond',serif}
  .game-back{position:absolute;left:0;top:2px;background:none;border:none;color:var(--parchment-dim);cursor:pointer;font-family:'Noto Serif SC',serif;font-size:.9rem;transition:.2s}
  .game-back:hover{color:var(--gold)}
  .game-menu{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .gm-card{cursor:pointer;background:linear-gradient(160deg,var(--panel-2),#12162a);border:1px solid var(--line);border-radius:14px;padding:24px 14px;color:var(--gold);display:flex;flex-direction:column;align-items:center;gap:9px;transition:.25s}
  .gm-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 16px 36px -18px rgba(0,0,0,.8)}
  .gm-ico{width:42px;height:42px;color:var(--gold)}
  .gm-card b{font-family:'Noto Serif SC',serif;color:var(--parchment);font-size:1.05rem;font-weight:600}
  .gm-card small{color:var(--parchment-dim);font-size:.76rem;text-align:center;line-height:1.4}
  .duel-arena{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .fighter{flex:1}
  .f-name{font-family:'Noto Serif SC',serif;font-size:.95rem;margin-bottom:6px;color:var(--parchment)}
  .duel-arena .fighter:last-child{text-align:right}
  .vs{font-family:'Cinzel',serif;color:var(--gold);font-size:.85rem;letter-spacing:.12em;opacity:.7}
  .hpbar{height:13px;border-radius:8px;background:rgba(0,0,0,.45);border:1px solid var(--line);overflow:hidden}
  .hpbar i{display:block;height:100%;border-radius:8px;transition:width .5s ease}
  .duel-prompt{text-align:center;font-family:'Noto Serif SC',serif;font-size:1.12rem;line-height:1.6;color:var(--parchment);min-height:54px;display:flex;align-items:center;justify-content:center;padding:14px 6px}
  .timebar{height:6px;border-radius:6px;background:rgba(0,0,0,.4);overflow:hidden;margin:4px 0 16px}
  .timebar i{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright))}
  .duel-opts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .duel-opt{cursor:pointer;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--parchment);display:flex;flex-direction:column;gap:3px;transition:.2s;text-align:left}
  .duel-opts{counter-reset:optk}
  .duel-opt{position:relative;counter-increment:optk}
  .duel-opt::before{content:counter(optk);position:absolute;top:5px;right:7px;font-size:.66rem;font-weight:800;color:var(--gold-bright);opacity:.8;border:1px solid var(--line);border-radius:5px;padding:0 4px;line-height:1.3}
  .duel-opt b{font-family:'Noto Serif SC',serif;font-size:1.02rem}
  .duel-opt small{font-family:'EB Garamond',serif;font-style:italic;color:var(--parchment-dim);font-size:.85rem}
  .duel-opt:hover:not(:disabled){border-color:var(--gold);transform:translateY(-2px)}
  .duel-opt:disabled{cursor:default;opacity:.6}
  .duel-opt.right{border-color:#5fb487;background:rgba(95,180,135,.14);opacity:1}
  .duel-opt.wrong{border-color:#cc5a5a;background:rgba(204,90,90,.14);opacity:1}
  .opt-cost{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.04em;color:#b39ddb;opacity:.9;margin-top:3px}
  .opt-cost.low{color:#e08a8a}
  .mana-row{display:flex;align-items:center;gap:10px;margin:2px 0 14px}
  .mana-label{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.04em;color:#b9a6e6;white-space:nowrap}
  .mana-label b{color:#dccbff}
  .manabar{flex:1;height:9px;border-radius:6px;background:rgba(0,0,0,.4);border:1px solid var(--line);overflow:hidden}
  .manabar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#6a4fb0,#b39ddb);transition:width .45s ease}
  .channel-btn{margin-top:14px;width:100%;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.04em;font-size:.82rem;padding:11px;border-radius:12px;border:1px solid #6a4fb0;background:linear-gradient(180deg,rgba(124,92,180,.2),rgba(124,92,180,.05));color:#cdbcf0;transition:.2s}
  .channel-btn:hover:not(:disabled){background:rgba(124,92,180,.32);border-color:#b39ddb;transform:translateY(-1px)}
  .channel-btn:disabled{opacity:.4;cursor:default}
  .wand{display:inline-block;vertical-align:middle;line-height:0}
  .wand.flung{animation:fling .8s cubic-bezier(.3,.1,.5,1) forwards}
  @keyframes fling{to{transform:translate(46px,-66px) rotate(240deg);opacity:0}}
  .duel-prompt.disarm,.buzz-half.disarm .bh-prompt{color:var(--gold-bright)}
  .disarm-tag{display:block;font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.14em;color:#ff7a3c;border:1px solid #ff7a3c;border-radius:20px;padding:3px 0;margin:0 auto 10px;max-width:200px;text-align:center;animation:disarmpulse 1s ease-in-out infinite}
  @keyframes disarmpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,122,60,0)}50%{box-shadow:0 0 14px 0 rgba(255,122,60,.5)}}
  .buzz-half.disarm{border-color:#ff7a3c !important}
  .wand.gone{opacity:.18;filter:grayscale(1)}
  .disarm-debuff{display:inline-block;margin-left:6px;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.05em;color:#ff7a3c;border:1px solid #ff7a3c;border-radius:12px;padding:1px 7px}

  {cat:'character',zh:'哈利·波特',en:'Harry Potter',meta:'格兰芬多 · "大难不死的男孩"',meta_en:'Gryffindor · "The Boy Who Lived"',
   fields:{学院:'格兰芬多',身份:'凤凰社成员、伏地魔宿敌',标志:'额头上的闪电形伤疤'},
   fields_en:{House:'Gryffindor',Role:'Member of the Order of the Phoenix; Voldemort’s nemesis',Mark:'A lightning-bolt scar on his forehead'},
   desc:'系列故事的主角。婴儿时父母在伏地魔的袭击中遇害，他却奇迹般地活下来，额头留下一道闪电形伤疤，从此被称为"大难不死的男孩"。在女贞路的姨妈家长大并备受冷落，直到十一岁收到霍格沃茨的入学通知，才得知自己是巫师。他擅长魁地奇中的找球手位置，最拿手的咒语是"除你武器"。最终他承担起对抗黑魔王的使命，与好友赫敏、罗恩并肩走过整段冒险。',
   desc_en:'The hero of the series. As a baby he survived Voldemort’s attack that killed his parents, left only with a lightning-bolt scar and forever known as "The Boy Who Lived." Raised and neglected by his aunt’s family on Privet Drive, he learned he was a wizard only at eleven when his Hogwarts letter arrived. A gifted Seeker, his signature spell is Expelliarmus. In the end he takes up the burden of opposing the Dark Lord, walking the whole adventure beside his friends Hermione and Ron.'},
  {cat:'character',zh:'赫敏·格兰杰',en:'Hermione Granger',meta:'格兰芬多 · 麻瓜出身',meta_en:'Gryffindor · Muggle-born',
   fields:{学院:'格兰芬多',特点:'博学、记忆超群、逻辑缜密',口头禅:'"你们能不能先看看书？"'},
   fields_en:{House:'Gryffindor',Traits:'Brilliant, superb memory, rigorous logic',Catchphrase:'"Have you two read a book?"'},
   desc:'出身于麻瓜（普通人）家庭的女巫，是全校公认成绩最优异的学生之一。她几乎读遍图书馆的藏书，无数次凭借渊博知识帮三人组化险为夷。她重视正义，曾创立组织争取家养小精灵的权益。表面一丝不苟，内心却极为勇敢忠诚，是哈利和罗恩最可靠的伙伴。',
   desc_en:'A Muggle-born witch widely regarded as one of the brightest students in the school. Having read nearly the whole library, she saves the trio time and again with her vast knowledge. Devoted to justice, she once founded an organization for house-elf rights. Outwardly meticulous, she is fiercely brave and loyal — Harry and Ron’s most dependable companion.'},
  {cat:'character',zh:'罗恩·韦斯莱',en:'Ron Weasley',meta:'格兰芬多 · 纯血统',meta_en:'Gryffindor · Pure-blood',
   fields:{学院:'格兰芬多',家庭:'韦斯莱家最小的儿子',爱好:'巫师棋、魁地奇'},
   fields_en:{House:'Gryffindor',Family:'The youngest Weasley son',Hobby:'Wizard chess, Quidditch'},
   desc:'哈利在霍格沃茨结识的第一位好友，来自人丁兴旺却并不富裕的纯血统巫师家庭。他幽默、忠诚，虽时常因家境与众多优秀的哥哥而自卑，却总在关键时刻挺身而出。他是出色的巫师棋手，后来成为格兰芬多魁地奇队的守门员。',
   desc_en:'The first friend Harry makes at Hogwarts, from a large but not wealthy pure-blood family. Funny and loyal, he often feels overshadowed by his family’s means and his many talented brothers, yet always steps up when it counts. A fine wizard-chess player, he later becomes Gryffindor’s Quidditch Keeper.'},
  {cat:'character',zh:'阿不思·邓布利多',en:'Albus Dumbledore',meta:'霍格沃茨校长',meta_en:'Headmaster of Hogwarts',
   fields:{职务:'霍格沃茨校长、凤凰社领袖',头衔:'威森加摩首席魔法师',坐骑:'凤凰福克斯'},
   fields_en:{Role:'Headmaster of Hogwarts; leader of the Order of the Phoenix',Title:'Chief Warlock of the Wizengamot',Companion:'Fawkes the phoenix'},
   desc:'被誉为当世最伟大的巫师，霍格沃茨的校长。他睿智、慈祥又深不可测，是少数令伏地魔忌惮的人。年轻时曾击败黑巫师格林德沃，掌握着关于黑魔王和魂器的核心秘密。他在幕后悉心引导哈利成长，为最终的胜利布下深远的棋局。',
   desc_en:'Hailed as the greatest wizard of the age and Headmaster of Hogwarts. Wise, kindly and unfathomable, he is one of the few Voldemort fears. In his youth he defeated the dark wizard Grindelwald, and he holds the central secrets of the Dark Lord and the Horcruxes. He guides Harry’s growth from behind the scenes, laying a far-reaching plan for the final victory.'},
  {cat:'character',zh:'西弗勒斯·斯内普',en:'Severus Snape',meta:'斯莱特林 · 魔药课教授',meta_en:'Slytherin · Potions Master',
   fields:{学院:'斯莱特林',职务:'魔药课教授、后任院长',双重身份:'凤凰社的隐秘间谍'},
   fields_en:{House:'Slytherin',Role:'Potions Master, later Head of House',Double_life:'A secret spy for the Order'},
   desc:'冷峻刻薄的魔药课教授，是全书最复杂、最具悲剧色彩的人物。他表面效忠黑魔王，实则因对哈利母亲莉莉始终如一的爱，长期作为邓布利多安插在敌方的间谍，默默守护着哈利。他的真实立场直到故事结尾才完全揭晓，令人动容。',
   desc_en:'The cold, caustic Potions Master and the most complex, tragic figure in the books. Outwardly loyal to the Dark Lord, he in truth — out of an unwavering love for Harry’s mother Lily — served for years as Dumbledore’s spy within the enemy ranks, silently protecting Harry. His true allegiance is revealed only at the story’s end, and it is deeply moving.'},
  {cat:'character',zh:'伏地魔',en:'Lord Voldemort',meta:'本名 汤姆·里德尔 · 黑魔王',meta_en:'Born Tom Riddle · The Dark Lord',
   fields:{本名:'汤姆·马沃罗·里德尔',学院:'斯莱特林',野心:'征服巫师界、追求永生'},
   fields_en:{Real_name:'Tom Marvolo Riddle',House:'Slytherin',Ambition:'To rule the wizarding world and conquer death'},
   desc:'系列的终极反派，自称"黑魔王"。他本名汤姆·里德尔，是萨拉查·斯莱特林的后裔。为追求永生，他将灵魂分裂成多个魂器，逐渐失去人性与外貌。他蔑视麻瓜出身的巫师，妄图统治整个魔法世界，却因当年那道夺命咒在哈利身上反弹而元气大伤，从此与哈利命运纠缠。',
   desc_en:'The ultimate villain of the series, styling himself "the Dark Lord." Born Tom Riddle, he is the heir of Salazar Slytherin. In pursuit of immortality he split his soul into multiple Horcruxes, gradually losing his humanity and his face. Despising Muggle-born wizards, he sought to rule all of magic — only to be crippled when his Killing Curse rebounded off the infant Harry, binding their fates together ever after.'},
  {cat:'character',zh:'鲁伯·海格',en:'Rubeus Hagrid',meta:'格兰芬多 · 钥匙与场地保管员',meta_en:'Gryffindor · Keeper of Keys and Grounds',
   fields:{身份:'霍格沃茨钥匙与场地保管员',血统:'半巨人',爱好:'饲养危险的魔法生物'},
   fields_en:{Role:'Keeper of Keys and Grounds at Hogwarts',Heritage:'Half-giant',Hobby:'Raising dangerous magical creatures'},
   desc:'身形高大的半巨人，霍格沃茨的猎场看守与钥匙保管员，后兼任神奇动物保护课教师。他外表威猛，心地却异常温柔善良，对各种凶险的魔法生物毫无抵抗力。是他亲自把哈利从女贞路带进魔法世界，也是三人组始终信赖的长辈与朋友。',
   desc_en:'A towering half-giant, gamekeeper and Keeper of Keys at Hogwarts, later teacher of Care of Magical Creatures. Fearsome in appearance but exceptionally gentle and kind-hearted, with a weakness for the most dangerous beasts. It was he who brought Harry out of Privet Drive into the magical world, and he remains a trusted elder and friend to the trio.'},
  {cat:'character',zh:'米勒娃·麦格',en:'Minerva McGonagall',meta:'格兰芬多 · 变形课教授',meta_en:'Gryffindor · Transfiguration Professor',
   fields:{学院:'格兰芬多',职务:'变形课教授、副校长、格兰芬多院长',技能:'阿尼马格斯（可变为猫）'},
   fields_en:{House:'Gryffindor',Role:'Transfiguration Professor, Deputy Headmistress, Head of Gryffindor',Skill:'Animagus (can become a cat)'},
   desc:'治学严谨、不苟言笑的变形课教授兼格兰芬多院长。她是一名注册阿尼马格斯，能随意变成一只眼周带斑纹的猫。她外表严厉，对学生却饱含关怀，是邓布利多最信任的副手之一，在保卫霍格沃茨的战斗中身先士卒。',
   desc_en:'The strict, no-nonsense Transfiguration Professor and Head of Gryffindor. A registered Animagus, she can turn at will into a cat with markings around its eyes. Severe on the surface, she cares deeply for her students, is one of Dumbledore’s most trusted deputies, and leads from the front in the defence of Hogwarts.'},
  {cat:'character',zh:'德拉科·马尔福',en:'Draco Malfoy',meta:'斯莱特林 · 纯血统',meta_en:'Slytherin · Pure-blood',
   fields:{学院:'斯莱特林',家世:'显赫的纯血统马尔福家族',身份:'哈利在校期间的死对头'},
   fields_en:{House:'Slytherin',Lineage:'The prominent pure-blood Malfoy family',Role:'Harry’s school rival'},
   desc:'出身豪门的斯莱特林学生，自幼养成傲慢势利的性格，是哈利在学校里的主要对头。在父亲卢修斯的影响下卷入黑魔王阵营，但他内心其实软弱、恐惧，多次在关键时刻流露出犹豫与人性，是一个并非彻底邪恶的角色。',
   desc_en:'A Slytherin from a wealthy house, raised arrogant and snobbish, and Harry’s chief rival at school. Drawn into the Dark Lord’s camp under his father Lucius’s influence, he is in truth weak and fearful, repeatedly showing hesitation and humanity at crucial moments — a character who is not wholly evil.'},
  {cat:'character',zh:'小天狼星·布莱克',en:'Sirius Black',meta:'格兰芬多 · 哈利的教父',meta_en:'Gryffindor · Harry’s godfather',
   fields:{学院:'格兰芬多',身份:'哈利的教父、凤凰社成员',技能:'阿尼马格斯（可变为大黑狗）'},
   fields_en:{House:'Gryffindor',Role:'Harry’s godfather; member of the Order',Skill:'Animagus (can become a large black dog)'},
   desc:'哈利父亲詹姆最好的朋友，也是哈利的教父。他曾蒙冤入狱阿兹卡班多年，后越狱以证清白。作为阿尼马格斯，他能变成一条大黑狗。他叛逆不羁却对哈利满怀关爱，把哈利当作自己人生中最重要的牵挂。',
   desc_en:'Best friend of Harry’s father James and Harry’s godfather. Wrongfully imprisoned in Azkaban for years, he broke out to clear his name. As an Animagus he can become a large black dog. Rebellious and free-spirited, he loves Harry fiercely and treats him as the most important person in his life.'},
  {cat:'character',zh:'莱姆斯·卢平',en:'Remus Lupin',meta:'格兰芬多 · 黑魔法防御术教授',meta_en:'Gryffindor · Defence Against the Dark Arts Professor',
   fields:{学院:'格兰芬多',职务:'黑魔法防御术教授',秘密:'狼人'},
   fields_en:{House:'Gryffindor',Role:'Defence Against the Dark Arts Professor',Secret:'A werewolf'},
   desc:'温和博学的黑魔法防御术教授，深受学生爱戴。他幼时被咬伤成为狼人，每逢满月便要忍受变身的痛苦，须依靠狼毒药剂维持神志。作为哈利父辈"劫盗者"四人组的一员，他在哈利成长路上给予了重要的指引。',
   desc_en:'The gentle, learned Defence Against the Dark Arts Professor, beloved by his students. Bitten as a child and turned into a werewolf, he endures a painful transformation each full moon, relying on the Wolfsbane Potion to keep his mind. One of the "Marauders" of Harry’s father’s circle, he offers vital guidance on Harry’s path.'},
  {cat:'character',zh:'贝拉特里克斯·莱斯特兰奇',en:'Bellatrix Lestrange',meta:'斯莱特林 · 食死徒',meta_en:'Slytherin · Death Eater',
   fields:{学院:'斯莱特林',身份:'伏地魔最狂热的追随者',性格:'残忍、疯狂、绝对忠诚'},
   fields_en:{House:'Slytherin',Role:'Voldemort’s most fanatical follower',Nature:'Cruel, deranged, utterly loyal'},
   desc:'伏地魔麾下最狂热、最危险的食死徒之一，对黑魔王怀有近乎崇拜的忠诚。她曾用钻心咒折磨纳威的父母致其失常，也亲手杀害了小天狼星。她的疯狂与残暴贯穿后期剧情，是黑暗阵营中极具威胁的战力。',
   desc_en:'One of the most fanatical and dangerous of Voldemort’s Death Eaters, devoted to the Dark Lord with near worship. She tortured Neville’s parents into insanity with the Cruciatus Curse and killed Sirius with her own hand. Her madness and cruelty run through the later story, making her a formidable force on the dark side.'},
  {cat:'character',zh:'金妮·韦斯莱',en:'Ginny Weasley',meta:'格兰芬多 · 纯血统',meta_en:'Gryffindor · Pure-blood',
   fields:{学院:'格兰芬多',身份:'韦斯莱家唯一的女儿',特长:'魁地奇、蝙蝠精恶咒'},
   fields_en:{House:'Gryffindor',Role:'The only Weasley daughter',Talent:'Quidditch, the Bat-Bogey Hex'},
   desc:'韦斯莱家最小的孩子，也是唯一的女儿。她起初在哈利面前羞怯腼腆，长大后却展现出独立坚强、伶牙俐齿的一面，是出色的魁地奇球员，擅长使出威力惊人的"蝙蝠精恶咒"。她最终成为哈利的伴侣。',
   desc_en:'The youngest Weasley child and their only daughter. Shy around Harry at first, she grows into an independent, sharp-tongued young woman and an excellent Quidditch player, famous for her powerful Bat-Bogey Hex. She becomes Harry’s partner in the end.'},
  {cat:'character',zh:'弗雷德与乔治·韦斯莱',en:'Fred & George Weasley',meta:'格兰芬多 · 双胞胎',meta_en:'Gryffindor · Twins',
   fields:{学院:'格兰芬多',身份:'韦斯莱家的双胞胎',事业:'"韦斯莱魔法把戏坊"'},
   fields_en:{House:'Gryffindor',Role:'The Weasley twins',Business:'Weasleys’ Wizard Wheezes'},
   desc:'韦斯莱家一对调皮捣蛋、形影不离的双胞胎兄弟，全校闻名的恶作剧大师。他们才华横溢却厌恶死板的课业，毅然退学创办了大获成功的"韦斯莱魔法把戏坊"。乐观幽默的他们，为沉重的故事带来许多欢笑。',
   desc_en:'A pair of mischievous, inseparable Weasley twins and the school’s legendary pranksters. Brilliant but bored by rigid schoolwork, they boldly drop out to found the wildly successful joke shop "Weasleys’ Wizard Wheezes." Cheerful and witty, they bring much-needed laughter to a heavy story.'},
  {cat:'character',zh:'纳威·隆巴顿',en:'Neville Longbottom',meta:'格兰芬多 · 纯血统',meta_en:'Gryffindor · Pure-blood',
   fields:{学院:'格兰芬多',特长:'草药学',成长:'从笨拙少年到英勇战士'},
   fields_en:{House:'Gryffindor',Talent:'Herbology',Growth:'From clumsy boy to brave warrior'},
   desc:'起初笨拙健忘、缺乏自信的格兰芬多学生，常被同学忽视。他的父母被食死徒折磨致疯。随着故事推进，他在草药学上展露天赋，也逐渐变得勇敢果决，最终在霍格沃茨保卫战中拔出格兰芬多宝剑，斩杀了伏地魔的魂器之一。',
   desc_en:'At first a clumsy, forgetful Gryffindor lacking confidence and often overlooked — his parents were tortured to madness by Death Eaters. As the story unfolds he reveals a gift for Herbology and grows brave and resolute, finally drawing the Sword of Gryffindor in the Battle of Hogwarts to destroy one of Voldemort’s Horcruxes.'},
  {cat:'character',zh:'卢娜·洛夫古德',en:'Luna Lovegood',meta:'拉文克劳 · 纯血统',meta_en:'Ravenclaw · Pure-blood',
   fields:{学院:'拉文克劳',性格:'梦幻、特立独行、真诚',家庭:'《唱唱反调》主编之女'},
   fields_en:{House:'Ravenclaw',Nature:'Dreamy, eccentric, sincere',Family:'Daughter of The Quibbler’s editor'},
   desc:'拉文克劳学院一位与众不同的女孩，言行飘忽、不拘世俗，常被同学戏称为"古怪的卢娜"。她相信许多旁人觉得荒诞的事物，却拥有超乎常人的洞察力与赤诚之心，是哈利在困境中难得的真挚朋友。',
   desc_en:'An unusual Ravenclaw girl, dreamy and unconventional, often teased as "Loony" Lovegood. She believes in many things others find absurd, yet possesses uncommon insight and a true heart — a rare, genuine friend to Harry in his darkest times.'},
  {cat:'character',zh:'多比',en:'Dobby',meta:'家养小精灵 · 自由之身',meta_en:'House-elf · Free',
   fields:{种族:'家养小精灵',原主人:'马尔福家族',信念:'忠诚、追求自由'},
   fields_en:{Race:'House-elf',Former_master:'The Malfoy family',Belief:'Loyalty and freedom'},
   desc:'原属于马尔福家族的家养小精灵，本性善良勇敢。他冒着违抗主人的风险多次警告并保护哈利，后来被哈利用计谋帮助获得自由。重获自由后，他依然甘愿在危急关头挺身相助，其忠诚与牺牲令人潸然泪下。',
   desc_en:'A house-elf once bound to the Malfoy family, kind and brave by nature. Risking his masters’ wrath, he warned and protected Harry many times, and was later freed through Harry’s cunning. Even after gaining freedom he gladly comes to the rescue in moments of peril; his loyalty and sacrifice are heartbreaking.'},
  {cat:'character',zh:'莫丽·韦斯莱',en:'Molly Weasley',meta:'凤凰社 · 韦斯莱家女主人',meta_en:'Order of the Phoenix · Mistress of the Weasley home',
   fields:{身份:'韦斯莱家的母亲、凤凰社成员',性格:'慈爱而强悍'},
   fields_en:{Role:'Mother of the Weasleys; member of the Order',Nature:'Loving yet fierce'},
   desc:'韦斯莱一家温暖能干的母亲，把失去亲人的哈利当作自家孩子般疼爱。她平日操持家务、唠叨孩子，温柔而坚定。然而在最终决战中，为保护女儿金妮，她爆发出惊人的战斗力，亲手击败了凶残的贝拉特里克斯。',
   desc_en:'The warm, capable mother of the Weasley family, who loves the orphaned Harry as one of her own. Day to day she keeps house and frets over the children, gentle but firm. Yet in the final battle, to protect her daughter Ginny, she unleashes astonishing power and defeats the savage Bellatrix herself.'},
  {cat:'character',zh:'亚瑟·韦斯莱',en:'Arthur Weasley',meta:'凤凰社 · 魔法部职员',meta_en:'Order of the Phoenix · Ministry employee',
   fields:{职务:'魔法部禁止滥用麻瓜物品司',爱好:'痴迷麻瓜的各种发明'},
   fields_en:{Role:'Ministry’s Misuse of Muggle Artefacts Office',Hobby:'Fascinated by Muggle inventions'},
   desc:'韦斯莱家和蔼可亲的父亲，在魔法部任职，对麻瓜世界的种种发明充满孩子气的好奇。他正直善良、家庭观念极重，是凤凰社坚定的成员，始终站在对抗黑暗的一方。',
   desc_en:'The kindly father of the Weasleys, who works at the Ministry with a childlike curiosity about Muggle inventions. Honest, good-natured and deeply devoted to family, he is a steadfast member of the Order, always on the side fighting the darkness.'},
  {cat:'character',zh:'多洛雷斯·乌姆里奇',en:'Dolores Umbridge',meta:'魔法部 · 高级调查官',meta_en:'Ministry · High Inquisitor',
   fields:{职务:'魔法部要员、曾任霍格沃茨校长',作风:'专制、虚伪、酷爱粉色与小猫'},
   fields_en:{Role:'Senior Ministry official; once Headmistress of Hogwarts',Style:'Tyrannical, hypocritical, obsessed with pink and kittens'},
   desc:'魔法部派驻霍格沃茨的官员，是全系列最令人厌恶的反派之一。她外表甜腻、满屋粉色小猫装饰，内心却专横残忍。她以铁腕压制学生言论，甚至用沾血的羽毛笔体罚哈利，将整座学校变成令人窒息的牢笼。',
   desc_en:'A Ministry official posted to Hogwarts and one of the most loathsome villains of the series. Sickly sweet on the surface, her office full of pink and kitten plates, she is domineering and cruel within. She crushes student speech with an iron hand — even punishing Harry with a blood quill — turning the school into a suffocating prison.'},
  {cat:'character',zh:'卢修斯·马尔福',en:'Lucius Malfoy',meta:'斯莱特林 · 食死徒',meta_en:'Slytherin · Death Eater',
   fields:{学院:'斯莱特林',身份:'纯血统贵族、食死徒',特征:'手持蛇头杖'},
   fields_en:{House:'Slytherin',Role:'Pure-blood aristocrat; Death Eater',Trait:'Carries a serpent-headed cane'},
   desc:'德拉科的父亲，傲慢冷酷的纯血统贵族与食死徒。他凭借财富与人脉在魔法部呼风唤雨，是黑魔王早期的得力党羽。然而随着伏地魔变得愈发暴虐，他逐渐在恐惧中动摇，最终为保全家人而退缩。',
   desc_en:'Draco’s father, an arrogant and cold pure-blood aristocrat and Death Eater. With wealth and connections he wields influence at the Ministry and was an early lieutenant of the Dark Lord. But as Voldemort grows ever more tyrannical, he wavers in fear and ultimately shrinks back to save his family.'},
  {cat:'character',zh:'彼得·佩迪鲁',en:'Peter Pettigrew',meta:'格兰芬多 · 叛徒 "虫尾巴"',meta_en:'Gryffindor · the traitor "Wormtail"',
   fields:{学院:'格兰芬多',绰号:'虫尾巴',技能:'阿尼马格斯（可变为老鼠）'},
   fields_en:{House:'Gryffindor',Nickname:'Wormtail',Skill:'Animagus (can become a rat)'},
   desc:'哈利父亲詹姆当年"劫盗者"四人组中的一员，外号"虫尾巴"。他怯懦自私，为求自保背叛好友，向伏地魔出卖了波特夫妇的藏身之处，并嫁祸于小天狼星。他能变成一只老鼠，曾长期藏匿于韦斯莱家。',
   desc_en:'One of the four "Marauders" alongside Harry’s father James, nicknamed "Wormtail." Cowardly and selfish, he betrayed his friends to save himself, selling the Potters’ hiding place to Voldemort and framing Sirius. Able to turn into a rat, he hid for years with the Weasley family.'},
  {cat:'character',zh:'詹姆·波特',en:'James Potter',meta:'格兰芬多 · 哈利之父',meta_en:'Gryffindor · Harry’s father',
   fields:{学院:'格兰芬多',绰号:'尖头叉子',技能:'阿尼马格斯（可变为牡鹿）'},
   fields_en:{House:'Gryffindor',Nickname:'Prongs',Skill:'Animagus (can become a stag)'},
   desc:'哈利的父亲，"劫盗者"四人组的核心，能变成一头牡鹿。他在校时虽有些骄纵，却才华出众、重情重义。为掩护妻儿，他在伏地魔的袭击中英勇牺牲，把活下去的希望留给了哈利。哈利的守护神正是一头牡鹿。',
   desc_en:'Harry’s father and the heart of the "Marauders," able to become a stag. Somewhat spoiled at school yet gifted and fiercely loyal, he died bravely shielding his wife and son from Voldemort’s attack, leaving Harry the hope of survival. Harry’s own Patronus is a stag.'},
  {cat:'character',zh:'莉莉·波特',en:'Lily Potter',meta:'格兰芬多 · 哈利之母',meta_en:'Gryffindor · Harry’s mother',
   fields:{学院:'格兰芬多',血统:'麻瓜出身',馈赠:'以生命之爱为哈利筑起守护'},
   fields_en:{House:'Gryffindor',Heritage:'Muggle-born',Gift:'Wove protection for Harry through a mother’s love'},
   desc:'哈利的母亲，麻瓜出身却天资聪颖、心地善良。她在伏地魔面前以身体挡在襁褓中的哈利身前，用母爱的牺牲为儿子施下古老而强大的护佑，使夺命咒在哈利身上反弹。她的爱是贯穿全篇最核心的力量。',
   desc_en:'Harry’s mother, Muggle-born yet brilliant and kind. Standing between the cradled Harry and Voldemort, she gave her life, and that sacrifice of a mother’s love laid an ancient, powerful protection over her son, causing the Killing Curse to rebound. Her love is the central force running through the whole saga.'},
  {cat:'character',zh:'吉德罗·洛哈特',en:'Gilderoy Lockhart',meta:'黑魔法防御术教授',meta_en:'Defence Against the Dark Arts Professor',
   fields:{职务:'黑魔法防御术教授',真相:'徒有虚名的"名人"',专长:'遗忘咒'},
   fields_en:{Role:'Defence Against the Dark Arts Professor',Truth:'A "celebrity" of empty fame',Specialty:'Memory Charms'},
   desc:'风度翩翩、自恋至极的"名人"作家，曾出任黑魔法防御术教师。事实上他著作中的英雄事迹全是窃取他人功劳、再用遗忘咒抹去当事人记忆而来。他华而不实、毫无真才实学，最终被自己的遗忘咒反噬。',
   desc_en:'A dashing, supremely vain "celebrity" author who once held the Defence Against the Dark Arts post. In truth, the heroic deeds in his books were stolen from others, whose memories he then erased with Memory Charms. All show and no substance, he is finally undone by his own backfiring Memory Charm.'},
  {cat:'character',zh:'西比尔·特里劳妮',en:'Sybill Trelawney',meta:'占卜课教授',meta_en:'Divination Professor',
   fields:{职务:'占卜课教授',特点:'多数预言不靠谱，却曾道出真正的预言'},
   fields_en:{Role:'Divination Professor',Trait:'Most prophecies are nonsense, but she once gave a true one'},
   desc:'神神道道的占卜课教授，平日故弄玄虚、危言耸听，所言大多不可信。然而她确曾在恍惚中说出两个真正的预言，其中关于"标记黑魔王对手"的预言，正是伏地魔决意除掉婴儿哈利的直接原因。',
   desc_en:'The mystical Divination Professor, given to theatrics and dire warnings, most of which mean nothing. Yet she has twice, in a trance, spoken genuine prophecies — the one marking "the Dark Lord’s equal" being the very reason Voldemort set out to kill the infant Harry.'},
  {cat:'character',zh:'阿拉斯托·穆迪',en:'Alastor "Mad-Eye" Moody',meta:'凤凰社 · 傲罗',meta_en:'Order of the Phoenix · Auror',
   fields:{绰号:'疯眼汉',职业:'退役傲罗（黑巫师捕手）',特征:'魔法义眼与木腿'},
   fields_en:{Nickname:'Mad-Eye',Career:'Retired Auror (dark-wizard catcher)',Trait:'A magical eye and a wooden leg'},
   desc:'传奇傲罗"疯眼汉"穆迪，一生擒拿无数黑巫师，身上布满战斗留下的伤痕，装有一只能透视一切的魔法义眼。他生性多疑、时刻警觉，信奉"时刻保持警惕"。作为凤凰社元老，他经验老到、忠勇可靠。',
   desc_en:'The legendary Auror "Mad-Eye" Moody, who caught countless dark wizards in his time, scarred all over from battle and fitted with a magical eye that sees through anything. Suspicious and ever-watchful, he lives by "constant vigilance." A founding member of the Order, he is seasoned, brave and dependable.'},
  {cat:'character',zh:'塞德里克·迪戈里',en:'Cedric Diggory',meta:'赫奇帕奇 · 三强争霸赛冠军',meta_en:'Hufflepuff · Triwizard champion',
   fields:{学院:'赫奇帕奇',身份:'霍格沃茨三强争霸赛参赛者',品格:'正直、谦和、光明磊落'},
   fields_en:{House:'Hufflepuff',Role:'Triwizard Tournament champion of Hogwarts',Character:'Upright, gracious, fair'},
   desc:'赫奇帕奇学院的优秀代表，英俊正直、广受欢迎。他在三强争霸赛中与哈利携手抵达终点，展现出难得的高尚品格。然而在终点处的墓地，他被复活的伏地魔残忍杀害，成为黑暗重新降临的第一个牺牲者。',
   desc_en:'A fine representative of Hufflepuff — handsome, honest and well-liked. He reached the finish of the Triwizard Tournament hand in hand with Harry, showing rare nobility. But at the graveyard beyond the finish he was cruelly murdered by the newly revived Voldemort, the first victim of the darkness returning.'},
  {cat:'character',zh:'尼法朵拉·唐克斯',en:'Nymphadora Tonks',meta:'凤凰社 · 傲罗',meta_en:'Order of the Phoenix · Auror',
   fields:{职业:'傲罗',天赋:'易容马格斯（可随意改变外貌）',性格:'开朗、笨拙又勇敢'},
   fields_en:{Career:'Auror',Gift:'Metamorphmagus (can change appearance at will)',Nature:'Cheerful, clumsy and brave'},
   desc:'年轻活泼的女傲罗，天生是"易容马格斯"，能随心所欲地改变自己的相貌和发色（她钟爱粉色头发）。她略显冒失却勇敢热心，是凤凰社的得力成员，后来与狼人卢平结为夫妻。',
   desc_en:'A young, lively Auror and a natural Metamorphmagus, able to change her looks and hair colour at will (she favours pink). A little clumsy but brave and warm-hearted, she is a valued member of the Order and later marries the werewolf Lupin.'},
  {cat:'character',zh:'霍拉斯·斯拉格霍恩',en:'Horace Slughorn',meta:'斯莱特林 · 魔药课教授',meta_en:'Slytherin · Potions Master',
   fields:{学院:'斯莱特林',职务:'魔药课教授、斯莱特林院长',爱好:'结交有前途的名人学生'},
   fields_en:{House:'Slytherin',Role:'Potions Master; Head of Slytherin',Hobby:'Collecting promising, well-connected students'},
   desc:'重返霍格沃茨任教的资深魔药大师，曾是斯莱特林院长。他爱慕虚荣，热衷于结交日后可能飞黄腾达的学生，组建自己的"鼻涕虫俱乐部"。他心中藏着一段关于年轻汤姆·里德尔与魂器的关键记忆。',
   desc_en:'A veteran Potions Master who returns to teach at Hogwarts, once Head of Slytherin. Vain and fond of cultivating students likely to rise to fame, he runs his own "Slug Club." He carries a crucial memory of the young Tom Riddle and the Horcruxes.'},
  {cat:'character',zh:'加里克·奥利凡德',en:'Garrick Ollivander',meta:'对角巷 · 魔杖制作大师',meta_en:'Diagon Alley · master wandmaker',
   fields:{身份:'对角巷魔杖店店主',信条:'"是魔杖选择巫师，而非巫师选择魔杖"'},
   fields_en:{Role:'Owner of the wand shop in Diagon Alley',Creed:'"The wand chooses the wizard, not the other way around"'},
   desc:'对角巷上声誉卓著的魔杖制作大师，几乎每位英国巫师的第一根魔杖都出自他手。他对每一根卖出的魔杖记忆精准，深谙杖芯、木材与主人之间微妙的契合。他坚信"是魔杖选择巫师"，对老魔杖的传说更是了如指掌。',
   desc_en:'The renowned master wandmaker of Diagon Alley, from whom nearly every British witch and wizard buys their first wand. He recalls every wand he has ever sold with precision and understands the subtle bond between core, wood and owner. He firmly believes "the wand chooses the wizard," and knows the legends of the Elder Wand inside out.'},

  /* ============ 地点 ============ */
  {cat:'place',zh:'霍格沃茨魔法学校',en:'Hogwarts',meta:'四大学院 · 故事的中心舞台',meta_en:'Four houses · the central stage of the story',
   fields:{全称:'霍格沃茨魔法学校',四大学院:'格兰芬多、斯莱特林、拉文克劳、赫奇帕奇',创立者:'四位中世纪的伟大巫师'},
   fields_en:{'Full name':'Hogwarts School of Witchcraft and Wizardry','Four houses':'Gryffindor, Slytherin, Ravenclaw, Hufflepuff','Founders':'Four great medieval witches and wizards'},
   desc:'英国魔法界最负盛名的寄宿学校，也是整个故事的核心舞台。它坐落于苏格兰高地一座神秘的城堡之中，由四位中世纪巫师创立，分为格兰芬多、斯莱特林、拉文克劳、赫奇帕奇四大学院。城堡内活动的楼梯、会说话的画像、神出鬼没的密室，处处充满魔法。',
   desc_en:'The most famous boarding school in wizarding Britain and the central stage of the whole story. Set in a mysterious castle in the Scottish Highlands and founded by four medieval wizards, it is divided into the four houses of Gryffindor, Slytherin, Ravenclaw and Hufflepuff. Moving staircases, talking portraits and hidden chambers fill the castle with magic at every turn.'},
  {cat:'place',zh:'对角巷',en:'Diagon Alley',meta:'伦敦 · 魔法购物街',meta_en:'London · the magical shopping street',
   fields:{位置:'隐藏于伦敦麻瓜世界之中',名店:'奥利凡德魔杖店、古灵阁、丽痕书店',入口:'破釜酒吧后墙的暗砖'},
   fields_en:{'Location':'Hidden within Muggle London','Famous shops':'Ollivanders, Gringotts, Flourish and Blotts','Entrance':'A hidden brick behind the Leaky Cauldron'},
   desc:'隐藏在伦敦闹市之中的魔法购物街，须从破釜酒吧后院敲击特定砖块才能进入。这里店铺林立，售卖魔杖、长袍、坩埚、猫头鹰、魔法书籍等一切学生与巫师所需之物，是哈利初识魔法世界繁华的第一站。',
   desc_en:'A magical shopping street hidden in bustling London, entered by tapping a particular brick in the wall behind the Leaky Cauldron. Lined with shops selling wands, robes, cauldrons, owls, spellbooks and everything a student or wizard could need, it is Harry’s first glimpse of the wonder of the magical world.'},
  {cat:'place',zh:'霍格莫德村',en:'Hogsmeade',meta:'全英唯一的纯巫师村庄',meta_en:'The only all-wizard village in Britain',
   fields:{特色:'全英国唯一没有麻瓜居住的村庄',名店:'三把扫帚、蜂蜜公爵糖果店、佐科恶作剧商店'},
   fields_en:{'Distinction':'The only settlement in Britain with no Muggle residents','Famous spots':'The Three Broomsticks, Honeydukes, Zonko’s Joke Shop'},
   desc:'紧邻霍格沃茨的小村庄，是全英国唯一一个完全由巫师居住的聚落。三年级以上的学生可在特定周末前往游玩。村中有热闹的"三把扫帚"酒吧、令人垂涎的"蜂蜜公爵"糖果店，以及阴森的"尖叫棚屋"。',
   desc_en:'A small village right beside Hogwarts, the only settlement in Britain inhabited entirely by wizards. Students in their third year and above may visit on certain weekends. It boasts the lively Three Broomsticks pub, the mouth-watering Honeydukes sweet shop, and the eerie Shrieking Shack.'},
  {cat:'place',zh:'魔法部',en:'Ministry of Magic',meta:'英国魔法界的政府机构',meta_en:'The government of wizarding Britain',
   fields:{职能:'管理英国魔法事务、对麻瓜保密',下属:'傲罗办公室、神秘事务司等',入口:'伦敦一座废弃电话亭'},
   fields_en:{'Function':'Governs magical affairs and keeps magic secret from Muggles','Departments':'Auror Office, Department of Mysteries, and more','Entrance':'A disused telephone box in London'},
   desc:'英国巫师界的最高行政机构，负责管理魔法事务并维护对麻瓜世界的保密。其总部深藏于伦敦地下，可通过一座旧电话亭进入。部内设有傲罗办公室、神秘事务司等部门，神秘事务司中存放着无数预言球与未解之谜。',
   desc_en:'The highest governing body of wizarding Britain, charged with managing magical affairs and keeping magic secret from the Muggle world. Its headquarters lie deep beneath London, reached through an old telephone box. It houses departments such as the Auror Office and the Department of Mysteries, the latter storing countless prophecy orbs and unsolved riddles.'},
  {cat:'place',zh:'古灵阁',en:'Gringotts',meta:'对角巷 · 巫师银行',meta_en:'Diagon Alley · the wizard bank',
   fields:{经营者:'妖精',特色:'深入地下的保险库，由巨龙看守',口碑:'号称最安全的地方（除霍格沃茨外）'},
   fields_en:{'Run by':'Goblins','Feature':'Deep underground vaults, some guarded by dragons','Reputation':'Said to be the safest place after Hogwarts'},
   desc:'坐落于对角巷、由妖精经营的巫师银行，被认为是除霍格沃茨外世上最安全的地方。其金库深藏于地下迷宫般的隧道中，须乘坐飞驰的矿车抵达，最深处的高级保险库甚至由巨龙看守，机关重重。',
   desc_en:'The wizarding bank in Diagon Alley, run by goblins and reputed to be the safest place on earth after Hogwarts. Its vaults lie deep in a labyrinth of underground tunnels reached by hurtling carts; the deepest high-security vaults are even guarded by a dragon, ringed with traps.'},
  {cat:'place',zh:'陋居',en:'The Burrow',meta:'韦斯莱一家的住所',meta_en:'Home of the Weasley family',
   fields:{居住者:'韦斯莱一家',特点:'靠魔法层层加盖、歪歪斜斜却温馨'},
   fields_en:{'Residents':'The Weasley family','Feature':'Held up by magic — crooked but cosy'},
   desc:'韦斯莱一家位于乡间的住宅，是一座靠魔法支撑、东拼西凑加盖而成的歪斜小楼，看似随时会倒却异常温馨。这里充满家庭的温暖与生活气息，是哈利心目中真正"家"的所在。',
   desc_en:'The Weasleys’ home in the countryside, a lopsided tower of rooms patched on with magic that looks ready to topple yet is wonderfully warm. Full of family love and the bustle of daily life, it is the place Harry thinks of as a true "home."'},
  {cat:'place',zh:'女贞路4号',en:'4 Privet Drive',meta:'德思礼家 · 哈利的童年',meta_en:'The Dursleys’ house · Harry’s childhood',
   fields:{居住者:'德思礼一家',哈利的住处:'最初的碗柜，后来的小房间'},
   fields_en:{'Residents':'The Dursley family','Harry’s room':'First the cupboard, later a small bedroom'},
   desc:'哈利的姨妈佩妮一家居住的麻瓜住宅，外观与街区其他房子毫无二致。哈利在这里度过了备受冷落的童年，长期住在楼梯下的碗柜里。这里也因莉莉的血脉护佑而成为哈利成年前最安全的避风港。',
   desc_en:'The ordinary Muggle house of Harry’s Aunt Petunia’s family, indistinguishable from the others on the street. Here Harry spent a neglected childhood, long confined to the cupboard under the stairs. Thanks to the protection of Lily’s blood, it was also Harry’s safest refuge until he came of age.'},
  {cat:'place',zh:'禁林',en:'Forbidden Forest',meta:'霍格沃茨 · 危险的密林',meta_en:'Hogwarts · the dangerous deep woods',
   fields:{位置:'霍格沃茨城堡旁',居民:'马人、八眼巨蛛、独角兽等',规矩:'严禁学生擅自进入'},
   fields_en:{'Location':'Beside Hogwarts castle','Inhabitants':'Centaurs, Acromantulas, unicorns and more','Rule':'Students are strictly forbidden to enter'},
   desc:'紧邻霍格沃茨城堡的一片幽深森林，因栖息着马人、八眼巨蛛、独角兽等各种危险或神秘的生物而被严禁学生入内。然而哈利等人却屡屡因各种缘由踏入其中，在这里经历了不少惊险的遭遇。',
   desc_en:'A deep, dark forest bordering Hogwarts castle, forbidden to students because it is home to dangerous and mysterious creatures — centaurs, giant Acromantulas, unicorns and more. Yet Harry and his friends repeatedly find reason to venture in, meeting no end of peril there.'},
  {cat:'place',zh:'九又四分之三站台',en:"Platform Nine and Three-Quarters",meta:'国王十字车站 · 通往霍格沃茨',meta_en:'King’s Cross · the way to Hogwarts',
   fields:{位置:'伦敦国王十字车站第9与第10站台之间',进入方法:'穿过分隔两站台的实心砖墙'},
   fields_en:{'Location':'Between Platforms 9 and 10 at London’s King’s Cross','How to enter':'Walk straight through the solid barrier'},
   desc:'位于伦敦国王十字车站第9与第10站台之间的隐藏站台，巫师须笔直冲过看似坚实的砖墙方能进入。每年九月一日，霍格沃茨特快列车都从这里出发，载着学生们驶向魔法学校，是无数巫师旅程的起点。',
   desc_en:'A hidden platform between Platforms 9 and 10 at London’s King’s Cross station, reached by walking straight through a seemingly solid brick barrier. Each September 1st the Hogwarts Express departs from here, carrying students to school — the starting point of countless wizards’ journeys.'},
  {cat:'place',zh:'阿兹卡班',en:'Azkaban',meta:'巫师监狱 · 摄魂怪看守',meta_en:'The wizard prison · guarded by Dementors',
   fields:{性质:'魔法世界的监狱',看守者:'摄魂怪',环境:'孤悬于北海的阴森堡垒'},
   fields_en:{'Nature':'The prison of the magical world','Guards':'Dementors','Setting':'A grim fortress alone in the North Sea'},
   desc:'孤悬于北海之中的巫师监狱，是魔法世界最令人恐惧的地方。监狱由摄魂怪看守，这些黑色怪物会吸走人所有的快乐与希望，使囚犯在绝望中日渐疯狂。小天狼星曾是史上极少数从这里成功越狱的人。',
   desc_en:'The wizard prison standing alone in the North Sea, the most dreaded place in the magical world. It is guarded by Dementors, black creatures that drain away all happiness and hope, driving prisoners slowly mad with despair. Sirius was one of the very few ever to escape it.'},
  {cat:'place',zh:'格里莫广场12号',en:'12 Grimmauld Place',meta:'凤凰社总部',meta_en:'Headquarters of the Order of the Phoenix',
   fields:{身份:'布莱克家族祖宅、凤凰社秘密总部',特点:'施有赤胆忠心咒，外人无法察觉'},
   fields_en:{'Identity':'The Black family home; secret HQ of the Order','Feature':'Hidden by the Fidelius Charm, undetectable to outsiders'},
   desc:'布莱克家族阴森古旧的祖宅，位于伦敦一处麻瓜街区。在小天狼星将其提供出来后，它成为凤凰社对抗伏地魔的秘密总部。屋内施有强大的隐藏魔法，墙上还挂着会破口大骂的布莱克太太肖像。',
   desc_en:'The gloomy old ancestral home of the Black family, in a Muggle neighbourhood of London. After Sirius offered it up, it became the Order of the Phoenix’s secret headquarters against Voldemort. Powerful concealment magic protects it, and a portrait of the screeching Mrs Black still hangs on the wall.'},
  {cat:'place',zh:'翻倒巷',en:'Knockturn Alley',meta:'对角巷旁 · 黑魔法集市',meta_en:'Off Diagon Alley · the Dark-magic market',
   fields:{位置:'与对角巷相通的岔巷',特色:'售卖黑魔法物品的阴暗街道',名店:'博金-博克商店'},
   fields_en:{'Location':'A side alley off Diagon Alley','Feature':'A shadowy street selling Dark-magic items','Famous shop':'Borgin and Burkes'},
   desc:'与繁华的对角巷相通、却阴森黑暗的一条岔巷，专营黑魔法相关的物品与禁忌器物。这里光线昏暗、行人形迹可疑，"博金-博克"商店便藏身其中，正经巫师通常对它避之唯恐不及。',
   desc_en:'A dark, sinister alley branching off the bright bustle of Diagon Alley, dealing in Dark-magic objects and forbidden artefacts. Dimly lit and full of shady characters, it hides the shop Borgin and Burkes; respectable wizards usually give it a wide berth.'},
  {cat:'place',zh:'有求必应屋',en:'Room of Requirement',meta:'霍格沃茨 · 神秘的房间',meta_en:'Hogwarts · the mysterious room',
   fields:{别名:'隐藏屋、来需之屋',特性:'根据使用者的需要变幻出相应的房间',位置:'八楼某段走廊'},
   fields_en:{'Other names':'The Come and Go Room','Property':'Transforms into whatever the user needs','Location':'A corridor on the seventh floor'},
   desc:'霍格沃茨城堡里一间极为神奇的隐藏房间，只在使用者真正需要它时才会显现，并依照需求变幻成相应的样子。哈利曾用它作为秘密组织"邓布利多军"的训练场所，它也曾化身为堆满杂物、藏匿秘密的巨大密室。',
   desc_en:'A remarkable hidden room in Hogwarts castle that appears only when someone truly needs it, shaping itself to their requirements. Harry used it as the training ground for his secret society "Dumbledore’s Army," and it has also become a vast chamber piled with junk and hidden secrets.'},
  {cat:'place',zh:'大礼堂',en:'Great Hall',meta:'霍格沃茨 · 用餐与典礼之所',meta_en:'Hogwarts · where meals and ceremonies are held',
   fields:{用途:'用餐、分院仪式、宴会、典礼',特色:'施了魔法的天花板，映照外面真实的天空'},
   fields_en:{'Use':'Meals, the Sorting, feasts and ceremonies','Feature':'An enchanted ceiling that mirrors the real sky'},
   desc:'霍格沃茨城堡内最宏伟的厅堂，四大学院的长桌一字排开。这里施有著名的魔法天花板，能映照出与户外一模一样的天空。新生分院仪式、节日盛宴、各种重大典礼都在此举行，是校园生活的中心。',
   desc_en:'The grandest hall in Hogwarts castle, where the long tables of the four houses run side by side. Its famous enchanted ceiling mirrors the sky outside exactly. The Sorting of new students, holiday feasts and all major ceremonies take place here, at the heart of school life.'},
  {cat:'place',zh:'圣芒戈魔法伤病医院',en:"St Mungo's Hospital",meta:'伦敦 · 魔法医院',meta_en:'London · the magical hospital',
   fields:{职能:'治疗魔法相关的疾病与伤患',入口:'伪装成一家废弃的麻瓜百货商店'},
   fields_en:{'Function':'Treats magical maladies and injuries','Entrance':'Disguised as a derelict Muggle department store'},
   desc:'伦敦的一所魔法医院，专门收治因咒语、魔药、魔法生物等造成的各种奇异伤病。它伪装成一家停业的麻瓜百货商店，巫师须对橱窗里的人体模型说话才能进入。纳威被折磨致疯的父母便长期在此疗养。',
   desc_en:'A magical hospital in London, treating the strange maladies caused by spells, potions and magical creatures. Disguised as a closed-down Muggle department store, it is entered by speaking to a mannequin in the window. Neville’s parents, tortured into madness, are long-term patients here.'},
  {cat:'place',zh:'戈德里克山谷',en:"Godric's Hollow",meta:'波特一家的故乡',meta_en:'The Potters’ home village',
   fields:{意义:'波特一家曾居住、莉莉与詹姆遇害之地',名人:'格兰芬多创始人戈德里克·格兰芬多的故乡'},
   fields_en:{'Significance':'Where the Potters lived and where Lily and James died','Notable':'Birthplace of Gryffindor founder Godric Gryffindor'},
   desc:'一座巫师与麻瓜混居的古老村庄，是格兰芬多创始人的故乡，也是波特一家曾经的居所。正是在这里，伏地魔杀害了哈利的父母，留下了那座被毁去一角的房屋。多年后哈利重返此地，凭吊双亲长眠的墓园。',
   desc_en:'An old village where wizards and Muggles live side by side, birthplace of the Gryffindor founder and once home to the Potter family. It was here that Voldemort murdered Harry’s parents, leaving behind the house with a corner blasted away. Years later Harry returns to pay his respects at the graveyard where they lie.'},

  /* ============ 魔咒 ============ */
  {cat:'spell',zh:'阿瓦达索命',en:'Avada Kedavra',meta:'不可饶恕咒 · 索命咒',meta_en:'Unforgivable Curse · Killing Curse',
   fields:{效果:'瞬间夺去目标生命',光色:'刺目的绿光',性质:'三大不可饶恕咒之一，使用即重罪'},
   fields_en:{Effect:'Ends the target’s life instantly',Light:'A blinding green flash',Nature:'One of the three Unforgivable Curses; casting it is a grave crime'},
   desc:'三大"不可饶恕咒"中最致命的一个，亦称"杀戮咒"。施放时会爆出一道刺目的绿光，能瞬间夺走目标的生命且无从抵挡、无法治愈。它没有反咒，唯一已知在其下幸存的人正是婴儿时的哈利。施放此咒即构成重罪，将被终身关押于阿兹卡班。',
   desc_en:'The deadliest of the three Unforgivable Curses, known as the Killing Curse. It bursts forth in a blinding green flash and ends a life instantly, with no way to block it and no cure. It has no counter-curse, and the only known survivor is Harry as a baby. Casting it is a grave crime, punishable by a life sentence in Azkaban.'},
  {cat:'spell',zh:'厉火咒',en:'Fiendfyre',meta:'魔火 · 高阶黑魔法',meta_en:'Cursed Fire · Advanced Dark Magic',
   fields:{效果:'召唤出仿佛有生命的灼热魔火',形态:'火焰化作巨蛇、火龙、奇美拉等猛兽',性质:'极难操控，是少数能摧毁魂器的力量之一'},
   fields_en:{Effect:'Conjures living, scorching cursed flames',Form:'Fire takes the shape of serpents, dragons and chimaeras',Nature:'Nearly uncontrollable; one of the few forces that can destroy a Horcrux'},
   desc:'一种极其凶险的高阶黑魔法之火。它召唤出的火焰仿佛拥有生命，会化作巨蛇、火龙、奇美拉等猛兽，吞噬一切、越烧越烈，寻常的灭火咒根本无法将其扑灭。厉火极难驾驭，稍有不慎便会反噬施咒者本人。它也是世间少数几种能彻底摧毁魂器的力量之一——在有求必应屋的混战中，克拉布召唤的厉火失控，既烧毁了拉文克劳的冠冕（一件魂器），也吞噬了他自己。',
   desc_en:'An extremely dangerous form of advanced Dark fire. The flames it conjures seem alive, taking the shape of giant serpents, dragons and chimaeras that devour everything and only grow fiercer; ordinary extinguishing charms cannot quench it. Fiendfyre is almost impossible to control and easily turns on its caster. It is also one of the few forces able to destroy a Horcrux — in the chaos of the Room of Requirement, the Fiendfyre Crabbe conjured raged out of control, destroying Ravenclaw’s Diadem (a Horcrux) and consuming him as well.'},
  {cat:'spell',zh:'钻心剜骨',en:'Crucio',meta:'不可饶恕咒 · 钻心咒',meta_en:'Unforgivable Curse · Torture Curse',
   fields:{效果:'令目标承受难以忍受的剧痛',性质:'三大不可饶恕咒之一',施咒要件:'施咒者须真心想让对方痛苦'},
   fields_en:{Effect:'Inflicts unbearable agony on the target',Nature:'One of the three Unforgivable Curses',Requirement:'The caster must truly wish to cause pain'},
   desc:'三大不可饶恕咒之一，又称"钻心咒"。它不伤及肉体，却能让目标承受全身钻心刺骨般的剧痛，是逼供与折磨的残忍手段。要真正发挥威力，施咒者必须发自内心地渴望使对方痛苦。纳威的父母正是被此咒长期折磨而精神崩溃。',
   desc_en:'One of the three Unforgivable Curses, the Cruciatus Curse. It leaves no physical wound yet wracks the target with bone-deep, excruciating pain — a cruel tool of interrogation and torture. To work at full power, the caster must genuinely desire to cause suffering. Neville’s parents were tortured into insanity by this curse.'},
  {cat:'spell',zh:'夺魂咒',en:'Imperio',meta:'不可饶恕咒 · 操控咒',meta_en:'Unforgivable Curse · Controlling Curse',
   fields:{效果:'完全操控目标的意志与行动',性质:'三大不可饶恕咒之一',抵抗方法:'极少数意志坚强者可挣脱'},
   fields_en:{Effect:'Completely controls the target’s will and actions',Nature:'One of the three Unforgivable Curses',Resistance:'A very strong-willed few can break free'},
   desc:'三大不可饶恕咒之一，能够完全剥夺目标的自主意识，使其在一种飘飘然的恍惚中对施咒者言听计从。中咒者可被驱使去做任何事，包括伤害自己或他人。只有极少数意志异常坚定的人，才有可能抵抗并挣脱它的控制。',
   desc_en:'One of the three Unforgivable Curses. It strips the target of free will, leaving them in a blissful daze and utterly obedient to the caster. The victim can be made to do anything, including harming themselves or others. Only a very few of exceptional willpower can resist and throw off its control.'},
  {cat:'spell',zh:'除你武器',en:'Expelliarmus',meta:'缴械咒',meta_en:'Disarming Charm',
   fields:{效果:'将对方手中的武器（多为魔杖）击飞',定位:'哈利最具标志性的招牌咒语'},
   fields_en:{Effect:'Knocks the weapon (usually a wand) from the target’s hand',Note:'Harry’s most iconic signature spell'},
   desc:'一道实用的缴械咒，能将对手手中的魔杖或武器猛地击飞，从而解除其攻击能力。它虽不致命，却是哈利最钟爱、使用最频繁的招牌咒语，也在最终决战中以一种意想不到的方式发挥了决定性的作用。',
   desc_en:'A practical Disarming Charm that wrenches an opponent’s wand or weapon out of their grasp, leaving them unable to attack. Though not lethal, it is Harry’s favourite and most-used signature spell — and it plays a decisive, unexpected role in the final battle.'},
  {cat:'spell',zh:'羽加迪姆勒维奥萨',en:'Wingardium Leviosa',meta:'悬浮咒',meta_en:'Levitation Charm',
   fields:{效果:'使物体漂浮于空中',要领:'强调发音与手腕的"挥—弹"动作'},
   fields_en:{Effect:'Makes objects float in the air',Tip:'Mind the pronunciation and the "swish and flick" of the wrist'},
   desc:'一道基础却经典的悬浮咒，能让物体轻盈地飘浮、升起。它是一年级学生最早学习的咒语之一，赫敏曾纠正罗恩"要注意发音、手腕轻轻一挥一弹"。三人组的友谊，也正始于一次用此咒击退巨怪的冒险。',
   desc_en:'A basic yet iconic Levitation Charm that lifts objects gently into the air. It is among the first spells first-years learn; Hermione famously corrected Ron on the pronunciation and the gentle "swish and flick." The trio’s friendship began with an adventure fending off a troll using this very charm.'},
  {cat:'spell',zh:'荧光闪烁',en:'Lumos',meta:'照明咒',meta_en:'Wand-Lighting Charm',
   fields:{效果:'使魔杖尖端发出光亮',反咒:'诺克斯（Nox）熄灭杖光'},
   fields_en:{Effect:'Makes the wand tip glow with light',Counter:'Nox puts the light out'},
   desc:'一道简单实用的照明咒，能让魔杖的尖端亮起，如同一支手电筒，在黑暗中照亮前路。它几乎是每位巫师都会的基础咒语，对应的反咒"诺克斯"则可让杖光熄灭。',
   desc_en:'A simple, handy charm that lights the tip of the wand like a torch to illuminate the way in darkness. Nearly every witch and wizard knows it; the counter-charm Nox extinguishes the light.'},
  {cat:'spell',zh:'呼神护卫',en:'Expecto Patronum',meta:'守护神咒',meta_en:'Patronus Charm',
   fields:{效果:'召唤出银白色的守护神，驱退摄魂怪',要领:'须凝聚一段最强烈、最快乐的回忆',形态:'每人的守护神形态各不相同'},
   fields_en:{Effect:'Conjures a silver Patronus to drive off Dementors',Tip:'Must focus on one powerful, happy memory',Form:'Each person’s Patronus takes a different shape'},
   desc:'巫师界公认最艰深、最高阶的防御咒语之一，专门用以驱退摄魂怪。施咒者须全心凝聚一段最强烈的快乐回忆，方能召唤出一头银白色、由纯粹希望凝成的守护神。每个人的守护神形态各异——哈利的守护神是一头牡鹿，与他父亲的阿尼马格斯形态相同。',
   desc_en:'One of the most difficult and advanced defensive spells, used specifically to repel Dementors. The caster must focus entirely on a powerful happy memory to summon a silver Patronus woven from pure hope. Each person’s Patronus differs — Harry’s is a stag, the same as his father’s Animagus form.'},
  {cat:'spell',zh:'阿拉霍洞开',en:'Alohomora',meta:'开锁咒',meta_en:'Unlocking Charm',
   fields:{效果:'打开普通门锁与门闩',局限:'对施有特殊魔法封锁的门无效'},
   fields_en:{Effect:'Opens ordinary locks and bolts',Limit:'Useless against doors sealed with special magic'},
   desc:'一道便捷的开锁咒，轻轻一点便能打开寻常的门锁与门闩。它在潜行与探险时极为好用，不过对于那些被特殊魔法重重封锁的门户则无能为力。',
   desc_en:'A handy Unlocking Charm that springs open ordinary locks and bolts with a flick. Invaluable for sneaking and exploring, though powerless against doors sealed by special enchantments.'},
  {cat:'spell',zh:'飞来咒',en:'Accio',meta:'召唤咒',meta_en:'Summoning Charm',
   fields:{效果:'将远处的物体召唤到施咒者手中',要领:'通常需指明所召唤之物的名称'},
   fields_en:{Effect:'Summons a distant object into the caster’s hand',Tip:'Usually requires naming the object'},
   desc:'一道极为实用的召唤咒，能将远处的物体隔空吸引到自己手中，无论是落下的扫帚还是藏起的钥匙。哈利曾在三强争霸赛中用它召来火弩箭飞天扫帚，从而智取火龙。',
   desc_en:'A highly useful Summoning Charm that draws a distant object through the air into one’s hand — be it a falling broom or a hidden key. Harry used it in the Triwizard Tournament to summon his Firebolt and outwit a dragon.'},
  {cat:'spell',zh:'昏昏倒地',en:'Stupefy',meta:'昏迷咒',meta_en:'Stunning Spell',
   fields:{效果:'使目标当场昏迷、失去知觉',反咒:'快快复苏（Rennervate）将其唤醒'},
   fields_en:{Effect:'Knocks the target out cold on the spot',Counter:'Rennervate revives them'},
   desc:'决斗与战斗中最常用的攻击咒语之一，一道红光击中目标便能令其立即昏迷倒地、失去意识。它不会造成永久伤害，是傲罗制服敌人时偏爱的手段，对应的"快快复苏"可将昏迷者唤醒。',
   desc_en:'One of the most common attacking spells in duels and battle: a jet of red light that drops the target into instant unconsciousness. It causes no lasting harm and is favoured by Aurors for subduing foes; the counter "Rennervate" wakes the stunned.'},
  {cat:'spell',zh:'统统石化',en:'Petrificus Totalus',meta:'全身束缚咒',meta_en:'Full Body-Bind Curse',
   fields:{效果:'使目标四肢僵直、全身定住无法动弹',体验:'中咒者意识清醒却像被木板钉住'},
   fields_en:{Effect:'Locks the target’s limbs rigid, freezing them in place',Experience:'The victim stays conscious but stiff as a board'},
   desc:'一道全身束缚咒，中咒者会四肢瞬间僵直、笔直地倒下，全身动弹不得，仿佛被无形的木板牢牢钉住，但神志依旧清醒。赫敏曾在一年级时用它定住了试图阻拦三人组的纳威。',
   desc_en:'A Full Body-Bind Curse: the victim’s limbs snap rigid and they topple over stiffly, unable to move as if nailed to an invisible plank — yet fully conscious. Hermione used it in first year to freeze Neville when he tried to stop the trio.'},
  {cat:'spell',zh:'神锋无影',en:'Sectumsempra',meta:'斯内普自创的黑魔咒',meta_en:'Snape’s self-invented Dark spell',
   fields:{效果:'如同隐形利刃割开目标，造成深可见骨的伤口',来历:'斯内普学生时代自创，标注"专门对付敌人"'},
   fields_en:{Effect:'Slashes the target as if with an invisible blade, cutting deep',Origin:'Invented by Snape as a student, marked "For Enemies"'},
   desc:'一道极其危险的黑魔法咒语，由斯内普学生时代亲手发明，效果如同无形的利刃凌空划过，能在目标身上割出深深的伤口、血流如注。哈利曾在不知其威力的情况下对马尔福施放，险些将其重伤致死。',
   desc_en:'An extremely dangerous Dark spell invented by Snape in his school days. It acts like an invisible blade slicing through the air, opening deep, bleeding wounds. Harry, unaware of its power, once cast it at Malfoy and nearly killed him.'},
  {cat:'spell',zh:'盔甲护身',en:'Protego',meta:'铁甲咒（护盾咒）',meta_en:'Shield Charm',
   fields:{效果:'在身前形成一道无形护盾，反弹或挡下来袭的咒语',进阶:'存在威力更强的"超强铁甲咒"'},
   fields_en:{Effect:'Forms an invisible shield that blocks or rebounds incoming spells',Advanced:'A stronger "Protego Maxima" exists'},
   desc:'决斗中最基础也最重要的防御咒语，能在施咒者身前凝成一道无形的护盾，挡下、偏转甚至反弹袭来的轻型咒语。它是抵御攻击的第一道防线，也是"邓布利多军"成员的必修课。',
   desc_en:'The most basic and vital defensive spell in a duel, conjuring an invisible shield before the caster to block, deflect or even rebound light spells. It is the first line of defence and a staple of Dumbledore’s Army training.'},
  {cat:'spell',zh:'一忘皆空',en:'Obliviate',meta:'遗忘咒',meta_en:'Memory Charm',
   fields:{效果:'抹去或修改目标的特定记忆',风险:'施法不当会造成永久性的记忆损伤'},
   fields_en:{Effect:'Erases or alters specific memories of the target',Risk:'Mishandled, it can cause permanent memory damage'},
   desc:'一道修改记忆的咒语，能精准地抹去或篡改目标脑海中的特定片段，常被魔法部用于对见到魔法的麻瓜进行善后。然而若施法过猛或不当，则可能造成无法挽回的记忆损伤——洛哈特便是被自己的遗忘咒反噬而失忆。',
   desc_en:'A memory-modifying charm that precisely erases or rewrites specific memories, often used by the Ministry to deal with Muggles who have witnessed magic. Cast too forcefully or wrongly, it can cause irreversible damage — Lockhart lost his own memory when his Memory Charm backfired.'},
  {cat:'spell',zh:'火焰熊熊',en:'Incendio',meta:'燃烧咒',meta_en:'Fire-Making Spell',
   fields:{效果:'喷射出火焰，点燃目标物体'},
   fields_en:{Effect:'Shoots flames to set objects alight'},
   desc:'一道喷射火焰的咒语，能在杖尖燃起烈火并射向目标，用以点燃物体或御敌。它在生火、对抗某些畏火的魔法生物时十分有效。',
   desc_en:'A fire-conjuring spell that kindles flames at the wand tip and casts them at a target, used to light fires or fend off foes. It is effective for making fire and against certain creatures that fear flame.'},
  {cat:'spell',zh:'清水如泉',en:'Aguamenti',meta:'清水咒',meta_en:'Water-Making Spell',
   fields:{效果:'从杖尖喷出清澈的水流'},
   fields_en:{Effect:'Produces a jet of clear water from the wand tip'},
   desc:'一道清水咒，能从魔杖尖端涌出一股清澈的水流，可用来灭火、解渴或清洗。它在缺水或需灭火的危急关头颇为实用。',

/* ====== 原创 SVG 插画引擎 ====== */
let _uid=0; const uid=()=>'a'+(_uid++);
function star(x,y,c){return `<path d="M${x} ${y-5} L${x+1.4} ${y-1.4} L${x+5} ${y} L${x+1.4} ${y+1.4} L${x} ${y+5} L${x-1.4} ${y+1.4} L${x-5} ${y} L${x-1.4} ${y-1.4} Z" fill="${c}" opacity="0.8"/>`}

function houseColor(d){
  const m=(d.meta||'')+JSON.stringify(d.fields||{});
  if(m.includes('格兰芬多'))return {c1:'#7a1218',c2:'#e0b34a'};
  if(m.includes('斯莱特林'))return {c1:'#0e3b27',c2:'#9fc3ad'};
  if(m.includes('拉文克劳'))return {c1:'#16284f',c2:'#c79a5a'};
  if(m.includes('赫奇帕奇'))return {c1:'#7a5e0f',c2:'#f2d98a'};
  return {c1:'#2a2440',c2:'#d4b261'};
}

function placeType(z){
  if(z.includes('霍格沃茨'))return 'castle';
  if(z.includes('对角巷')||z.includes('翻倒巷'))return 'street';
  if(z.includes('站台'))return 'train';
  if(z.includes('阿兹卡班'))return 'fortress';
  if(z.includes('禁林'))return 'forest';
  if(z.includes('有求必应'))return 'door';
  if(z.includes('大礼堂'))return 'hall';
  if(z.includes('魔法部')||z.includes('古灵阁'))return 'tower';
  if(z.includes('陋居')||z.includes('女贞路')||z.includes('戈德里克')||z.includes('格里莫')||z.includes('圣芒戈')||z.includes('霍格莫德'))return 'house';
  return 'castle';
}

function makeArt(d){

/* ====== 渲染逻辑 ====== */
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const emptyEl = document.getElementById('empty');
let curCat = 'all';
let curQ = '';
let lang = 'zh';
function L(zh,en){return lang==='zh'?zh:en;}

document.getElementById('total').textContent = DATA.length;

function snippet(t){return t.length>96?t.slice(0,96)+'…':t}

function render(){
  const list = DATA.filter(d=>{
    const okCat = curCat==='all' || d.cat===curCat;
    const hay = (d.zh+d.en+(d.meta||'')+d.desc).toLowerCase();
    const okQ = !curQ || hay.includes(curQ);
    return okCat && okQ;
  });
  grid.innerHTML = '';
  countEl.textContent = L(`共 ${list.length} 条词目`,`${list.length} entries`);
  emptyEl.style.display = list.length? 'none':'block';
  list.forEach((d,i)=>{
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.cat = d.cat;
    el.style.animationDelay = Math.min(i*0.03,0.5)+'s';
    el.innerHTML = `
      <div class="card-art">${makeArt(d)}</div>
      <span class="tag">${L(CAT[d.cat].zh,CAT[d.cat].en)}</span>
      <h3>${L(d.zh,d.en)}</h3>
      <div class="en">${L(d.en,d.zh)}</div>
      ${d.meta?`<div class="meta">${L(d.meta,d.meta_en||d.meta)}</div>`:''}
      <div class="snippet">${snippet(L(d.desc,d.desc_en||d.desc))}</div>
      <div class="more">${L('阅读详情 →','Read more →')}</div>`;
    el.addEventListener('click',()=>openModal(d));
    grid.appendChild(el);
  });
}

/* ====== 弹窗 ====== */
const overlay = document.getElementById('overlay');
const modal = document.getElementById('modal');

function openModal(d){
  const accentVar = `--accent:var(--c-${d.cat})`;
  let fieldsHtml = '';
  const _fields=(lang==='en'&&d.fields_en)?d.fields_en:d.fields;
  if(_fields){
    for(const [k,v] of Object.entries(_fields)){
      fieldsHtml += `<div class="field"><div class="label">${k}</div><div class="value">${v}</div></div>`;
    }
  }
  const paras = ((lang==='en'&&d.desc_en)?d.desc_en:d.desc).split('\n').map(p=>`<p>${p}</p>`).join('');
  modal.setAttribute('style',accentVar);
  modal.innerHTML = `
    <button class="close" aria-label="关闭">×</button>
    <div class="modal-art">${makeArt(d)}</div>
    <span class="tag">${L(CAT[d.cat].zh,CAT[d.cat].en)}</span>
    <h2>${L(d.zh,d.en)}</h2>
    <div class="en">${L(d.en,d.zh)}</div>
    <div class="modal-divider"></div>
    ${fieldsHtml}
    ${fieldsHtml?'<div class="modal-divider"></div>':''}
    <div class="desc">${paras}</div>`;
  modal.querySelector('.close').addEventListener('click',closeModal);
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  modal.scrollTop=0;
}
function closeModal(){overlay.classList.remove('open');document.body.style.overflow=''}
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

/* ====== 筛选与搜索 ====== */
function showGamesView(){document.getElementById('gamesView').style.display='';document.getElementById('encycView').style.display='none';Game.menu();}
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent = lang==='zh'?el.dataset.zh:el.dataset.en;});
  const sb=document.getElementById('search');if(sb)sb.placeholder=L('搜索…（中英文皆可）','Search…  (中 / EN)');
  const lb=document.getElementById('langBtn');if(lb)lb.textContent=lang==='zh'?'EN':'中';
  if(document.getElementById('encycView').style.display!=='none')render();else Game.menu();
}
document.getElementById('langBtn').addEventListener('click',()=>{lang=lang==='zh'?'en':'zh';try{window.storage.set('lang',lang);}catch(e){}applyLang();});
function showEncycView(){document.getElementById('gamesView').style.display='none';document.getElementById('encycView').style.display='';}
document.getElementById('sideNav').addEventListener('click',e=>{
  const btn = e.target.closest('button.side-item'); if(!btn)return;
  document.querySelectorAll('#sideNav .side-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(btn.dataset.view==='games'){showGamesView();}
  else{curCat = btn.dataset.cat; showEncycView(); render();}
});
document.getElementById('search').addEventListener('input',e=>{
  curQ = e.target.value.trim().toLowerCase();
  if(curQ){document.querySelectorAll('#sideNav .side-item').forEach(b=>b.classList.remove('active'));showEncycView();}
  render();
});

    }
  },
  memEnd(){const m=this.m;this.clear();setTimeout(()=>{gamePanel.innerHTML=resultHTML('大功告成！',`你用 <b>${m.moves}</b> 步、<b>${m.sec}</b> 秒完成了全部配对。`);this.bindResult('memory');},650);},

  /* 守护神蓄力 */
  patronusSelect(){this.clear();const pb=this.patronusBest||{};const keys=['xlow','vlow','low','mid','high','vhigh','fakehigh','order','riddle'];
      const strip=keys.map(k=>`<div class="wave-crest"><div class="wc-num">${pb[k]||0}</div><div class="wc-name">${L(PDIFF[k].name,PDIFF[k].name_en)}</div></div>`).join('');
      gamePanel.innerHTML=`<button class="game-close">×</button>
      <div class="game-head"><button class="game-back">${L('‹ 返回','‹ Back')}</button><h2>${L('守护神蓄力','Patronus Charge')}</h2><p class="gh-sub">${L('选择摄魂怪的强度','Choose the Dementors’ strength')}</p></div>
      <div class="trophy-case"><div class="tc-title">${L('波次纪念 · 各档最佳抵御波数','Wave records · best waves held per tier')}</div><div class="wave-strip">${strip}</div>${keys.some(k=>pb[k])?`<button class="reset-btn">${L('重置纪录','Reset records')}</button>`:''}</div>
      <div class="diff-menu">${keys.map(k=>{const d=PDIFF[k];const best=pb[k]||0;return `<button class="gm-card diff-card" data-k="${k}"><b>${L(d.name,d.name_en)}</b><small>${L(d.sub,d.sub_en)}</small><span class="diff-stat">${d.lives}${L(' 次守护 · 每击 +',' lives · tap +')}${d.tap}<br>${L('逼近 ','closes in ')}${(d.base/1000).toFixed(1)}${L(' 秒起','s')}<br><span class="rec-line">${L('最佳 ','Best ')}${best}${L(' 波',' waves')}</span></span></button>`;}).join('')}</div>`;this.bindClose();gamePanel.querySelectorAll('.diff-card').forEach(b=>b.onclick=()=>this.startPatronus(b.dataset.k));this.bindReset(()=>{this.patronusBest={};this.savePatronus();this.patronusSelect();});},
  startPatronus(level){
    this.patronusLevel=level||this.patronusLevel||'mid';const cfg=PDIFF[this.patronusLevel];
    this.clear();this.p={wave:1,lives:cfg.lives,score:0,charge:0,running:false,cfg};
    gamePanel.innerHTML=`<button class="game-close">×</button>
      <div class="game-head"><button class="game-back">${L('‹ 返回','‹ Back')}</button><h2>${L('守护神蓄力 · ','Patronus Charge · ')}${L(cfg.name,cfg.name_en)}</h2></div>
      <div class="type-meta"><span>${L('守护 ','Lives ')}<b id="pLives">${'♥'.repeat(cfg.lives)}</b></span><span>${L('波次 ','Wave ')}<b id="pWave">1</b></span><span>${L('得分 ','Score ')}<b id="pScore">0</b></span></div>
      <div class="p-track"><div class="p-dementor" id="pDementor">${DEMENTOR}</div><div class="p-you"></div></div>
      <div class="hpbar" style="height:16px"><i id="pCharge" style="width:0%;background:linear-gradient(90deg,#7fa8d8,#eaf4ff)"></i></div>
      <button class="charge-btn" id="pBtn">${L('快乐回忆','Happy memory')}<small>${L('连续点击蓄力','tap fast to charge')}</small></button>
      <p class="mem-tip">${L('摄魂怪正在逼近！飞快点击蓄满守护神能量，在它到达之前释放呼神护卫。','The Dementor is closing in! Tap fast to fill the Patronus charge and cast Expecto Patronum before it reaches you.')}</p>`;
    this.bindClose();
    gamePanel.querySelector('#pBtn').onclick=()=>this.patronusTap();
    this.patronusWave();
  },
  patronusWave(){
    const p=this.p,cfg=p.cfg;p.charge=0;p.running=true;
    const cb=gamePanel.querySelector('#pCharge');if(cb)cb.style.width='0%';
    const dem=gamePanel.querySelector('#pDementor');
    p.duration=Math.max(cfg.base-p.wave*cfg.step,cfg.floor);p.startT=performance.now();
    const step=now=>{
      if(!p.running)return;
      p.charge=Math.max(0,p.charge-cfg.decay);if(cb)cb.style.width=p.charge+'%';
      const t=Math.min(1,(now-p.startT)/p.duration);if(dem)dem.style.left=(6+t*82)+'%';
      if(t>=1){this.patronusFail();return;}
      this.raf=requestAnimationFrame(step);
    };
    this.raf=requestAnimationFrame(step);
  },
  patronusTap(){const p=this.p;if(!p.running)return;p.charge=Math.min(100,p.charge+p.cfg.tap);const cb=gamePanel.querySelector('#pCharge');if(cb)cb.style.width=p.charge+'%';if(p.charge>=100)this.patronusWin();},
  patronusWin(){const p=this.p;p.running=false;cancelAnimationFrame(this.raf);this.silverFlash();p.score++;p.wave++;const ws=gamePanel.querySelector('#pWave'),sc=gamePanel.querySelector('#pScore');if(ws)ws.textContent=p.wave;if(sc)sc.textContent=p.score;this.timer=setTimeout(()=>this.patronusWave(),950);},
  patronusFail(){const p=this.p;p.running=false;cancelAnimationFrame(this.raf);p.lives--;const lv=gamePanel.querySelector('#pLives');if(lv)lv.textContent='♥'.repeat(Math.max(0,p.lives))||'—';const tr=gamePanel.querySelector('.p-track');if(tr){tr.classList.add('shake');setTimeout(()=>tr.classList.remove('shake'),350);}if(p.lives<=0)return this.patronusEnd();this.timer=setTimeout(()=>this.patronusWave(),950);},
  patronusEnd(){
    this.clear();const lv=this.patronusLevel,score=this.p.score,prev=this.patronusBest[lv]||0,isNew=score>prev;
    if(isNew){this.patronusBest[lv]=score;this.savePatronus();}
    const best=this.patronusBest[lv]||0;
    gamePanel.innerHTML=`<button class="game-close">×</button>
      <div class="result"><div class="r-title">${L('守护神消散了……','The Patronus faded…')}</div>
      <p class="medal-progress">${L('本次抵御 <b>'+score+'</b> 波 · 最佳 <b>'+best+'</b> 波','Held <b>'+score+'</b> waves · best <b>'+best+'</b>')}${isNew&&score>0?L(' · 新纪录！',' · New record!'):''}</p>
      <p>${L('摄魂怪冲破了防线，再凝聚一次守护神吧。','The Dementors broke through — gather your Patronus once more.')}</p>
      <div class="r-actions"><button class="game-btn" data-act="again">${L('再来一局','Play again')}</button><button class="game-btn ghost" data-act="select">${L('选择难度','Choose level')}</button><button class="game-btn ghost" data-act="menu">${L('返回菜单','Back to menu')}</button></div></div>`;
    this.bindClose();
    gamePanel.querySelector('[data-act="again"]').onclick=()=>this.startPatronus();
    gamePanel.querySelector('[data-act="select"]').onclick=()=>this.patronusSelect();
    {const mb=gamePanel.querySelector('[data-act="menu"]');if(this.storyFinish()){mb.textContent=L('继续剧情','Continue story');mb.onclick=()=>this.storySelect();}else mb.onclick=()=>this.menu();}
  },
  silverFlash(){const f=document.createElement('div');f.className='cast-flash';f.style.background='radial-gradient(circle at 84% 50%, #cfe8ffcc, #cfe8ff33 40%, transparent 70%)';f.innerHTML='<span class="castword" style="color:#e8f4ff">Expecto Patronum!</span>';gamePanel.appendChild(f);setTimeout(()=>f.remove(),900);},

  /* 咒语回响 */
  startEcho(){
    this.clear();
    const picks=shuffle(SPELLS.slice()).slice(0,5);
    this.e={orbs:picks,seq:[],input:[],lock:true};
    gamePanel.innerHTML=`<button class="game-close">×</button>
      <div class="game-head"><button class="game-back">${L('‹ 返回','‹ Back')}</button><h2>${L('咒语回响','Spell Echo')}</h2></div>
      <div class="type-meta"><span>${L('序列长度 ','Length ')}<b id="eLen">0</b></span><span id="eStatus">${L('准备开始…','Get ready…')}</span></div>
      <div class="echo-grid">${picks.map((s,i)=>`<button class="echo-orb" data-i="${i}" style="--oc:${s.color}"><b>${L(s.zh,s.en)}</b>${lang==="zh"?`<small>${s.en}</small>`:""}</button>`).join('')}</div>
      <p class="mem-tip">${L('记住每轮亮起的咒语顺序，再依次点亮它们重复施放。每答对一轮，序列就增加一道咒语。','Watch which spells light up each round, then tap them back in the same order. Every correct round adds one more spell.')}</p>`;
    this.bindClose();
    gamePanel.querySelectorAll('.echo-orb').forEach(b=>b.onclick=()=>this.echoClick(+b.dataset.i));
    this.timer=setTimeout(()=>this.echoNext(),800);
  },
  echoNext(){const e=this.e;e.input=[];e.seq.push(Math.floor(Math.random()*e.orbs.length));const ln=gamePanel.querySelector('#eLen');if(ln)ln.textContent=e.seq.length;this.echoPlay();},
  echoPlay(){const e=this.e;e.lock=true;this.setEchoStatus(L('注视咒语的闪烁顺序…','Watch the order the spells flash…'));let i=0;const flashNext=()=>{if(i>=e.seq.length){e.lock=false;this.setEchoStatus(L('该你了 —— 按顺序施放！','Your turn — cast them in order!'));return;}this.echoFlash(e.seq[i]);i++;this.timer=setTimeout(flashNext,720);};this.timer=setTimeout(flashNext,600);},
  echoFlash(idx){const o=gamePanel.querySelector(`.echo-orb[data-i="${idx}"]`);if(!o)return;o.classList.add('lit');setTimeout(()=>o.classList.remove('lit'),400);},
  echoClick(idx){const e=this.e;if(e.lock)return;this.echoFlash(idx);e.input.push(idx);const pos=e.input.length-1;if(e.input[pos]!==e.seq[pos])return this.echoEnd();if(e.input.length===e.seq.length){e.lock=true;this.setEchoStatus(L('正确！','Correct!'));this.timer=setTimeout(()=>this.echoNext(),780);}},
  setEchoStatus(t){const s=gamePanel.querySelector('#eStatus');if(s)s.textContent=t;},
  echoEnd(){const len=Math.max(0,this.e.seq.length-1);this.clear();gamePanel.innerHTML=resultHTML(L('咒语中断了……','The echo broke…'),L(`你成功回响了长度为 <b>${len}</b> 的咒语序列。`,`You echoed a spell sequence of length <b>${len}</b>.`));this.bindResult('echo');}
};

(async()=>{await Game.loadSaves();try{const lv=await window.storage.get('lang');if(lv&&lv.value)lang=lv.value;}catch(e){}applyLang();})();


render();
</script>
